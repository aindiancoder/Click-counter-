<!DOCTYPE html>
<html>
    <head>
        <title>Page Title</title>
    </head>
    <body>
    <h1>click counter</h1>
<div class="ball" onclick="add()">
 <h2 id="txt">tap</h2>   
</div>
<p id="output"></p>  
<style>
    .ball {
    width:300px;
    height:300px;
    background:red;
    border-radius:100%;
    margin:20px;
    text-align:center;
    
}
#txt {
    margin-bottom:20px;
    margin:20px;
    padding-bottom:10px;
}
#output {
    text-align:center;
    font-size:50px;
}
</style> 
<script>
    let click = 0;
function add() {
    click++;
    document.getElementById("output").innerText= click;
}
</script>    
    </body>
</html>
